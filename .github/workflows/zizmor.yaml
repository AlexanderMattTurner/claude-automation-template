name: zizmor

# Security audit of GitHub Actions workflows and composite actions.
#
# This workflow runs unconditionally (no workflow-level `paths:` filter) so its
# `zizmor-passed` summary gate always reports a status and can be marked
# Required. The `decide` job determines whether anything under .github changed;
# `zizmor` runs only when it did, and is skipped otherwise.

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  decide:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine if relevant paths changed
        id: filter
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: bash .github/scripts/paths-changed.sh '.github'

  zizmor:
    needs: [decide]
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Run zizmor
        run: uvx zizmor==1.25.2 .github/

  # Stable Required check: always runs (even when `zizmor` is skipped,
  # cancelled, or `decide` fails), so a protected branch never gets stuck on a
  # check that never reports. A skipped `zizmor` (decide said no) is not a
  # failure.
  zizmor-passed:
    if: always()
    needs: [decide, zizmor]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
