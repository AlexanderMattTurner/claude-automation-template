name: Lint

# This workflow runs unconditionally (no workflow-level `paths:` filter) so its
# `lint-passed` summary gate always reports a status and can be marked Required.
# The `decide` job determines whether the relevant files changed; `lint` runs
# only when they did, and is skipped (not failed) otherwise.

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  decide:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine if relevant paths changed
        id: filter
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: >
          bash .github/scripts/paths-changed.sh
          '*.ts' '*.tsx' '*.js' '*.jsx' 'package.json'
          '.github/workflows/lint.yaml' '.github/scripts/paths-changed.sh'

  lint:
    needs: [decide]
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env

      - name: Check if scripts are configured
        id: check
        run: |
          if bash .github/scripts/script-configured.sh check; then
            echo "check_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "check_configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Type check script not configured, skipping"
          fi
          if bash .github/scripts/script-configured.sh lint; then
            echo "lint_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "lint_configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Lint script not configured, skipping"
          fi

      - name: Type check
        if: steps.check.outputs.check_configured == 'true'
        run: pnpm check

      - name: Lint
        if: steps.check.outputs.lint_configured == 'true'
        run: pnpm lint

  # Stable Required check: always runs (even when `lint` is skipped, cancelled,
  # or `decide` fails), so a protected branch never gets stuck on a check that
  # never reports. A skipped `lint` (decide said no) is not a failure.
  lint-passed:
    if: always()
    needs: [decide, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
