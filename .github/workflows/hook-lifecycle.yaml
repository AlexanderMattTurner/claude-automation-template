name: Hook lifecycle

# Runs the full Claude hook lifecycle (session setup -> pre-commit -> pre-push)
# on a clean checkout, so a broken hook is caught in CI rather than in a session.
#
# This workflow runs unconditionally (no workflow-level `paths:` filter) so its
# `hook-lifecycle-passed` summary gate always reports a status and can be marked
# Required. The `decide` job determines whether the relevant files changed; the
# `hook-lifecycle` job runs only when they did, and is skipped otherwise.

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  decide:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine if relevant paths changed
        id: filter
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: >
          bash .github/scripts/paths-changed.sh
          '.claude/hooks' '.hooks' 'setup.sh' 'package.json' 'pnpm-lock.yaml'
          'pyproject.toml' 'uv.lock' '.pre-commit-config.yaml'
          '.github/scripts/run-hook-lifecycle.sh' '.github/scripts/paths-changed.sh'
          '.github/workflows/hook-lifecycle.yaml'

  hook-lifecycle:
    needs: [decide]
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env
        with:
          setup-python: "true"

      - name: Run hook lifecycle
        run: bash .github/scripts/run-hook-lifecycle.sh

  # Stable Required check: always runs (even when `hook-lifecycle` is skipped,
  # cancelled, or `decide` fails), so a protected branch never gets stuck on a
  # check that never reports. A skipped `hook-lifecycle` (decide said no) is not
  # a failure.
  hook-lifecycle-passed:
    if: always()
    needs: [decide, hook-lifecycle]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
